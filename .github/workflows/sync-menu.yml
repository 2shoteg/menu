name: 🔄 تحديث المنيو من Google Sheets

on:
  workflow_dispatch:

jobs:
  update-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔄 Generate menu.html from Google Sheets
        run: python generate_menu.py

      - name: 💾 Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add menu.html
          git diff --staged --quiet || git commit -m "🔄 تحديث المنيو تلقائياً من Google Sheets"
          git push origin main --force-with-lease
